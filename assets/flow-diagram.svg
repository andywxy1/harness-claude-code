<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Node glow filters -->
    <filter id="glow-green" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22543d" flood-opacity="0.12"/>
    </filter>
    <filter id="glow-blue" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#60a5fa" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#1e3a5f" flood-opacity="0.1"/>
    </filter>
    <filter id="glow-amber" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#f59e0b" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#713f12" flood-opacity="0.1"/>
    </filter>
    <filter id="glow-neutral" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#c8ced8" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#252d3a" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#3a4556"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5c3a10"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#0d1117"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="520" rx="12" fill="url(#grid)" opacity="0.5"/>

  <!-- ===================== STEP 1: PLANNER ===================== -->
  <g filter="url(#glow-green)">
    <rect x="250" y="22" width="300" height="62" rx="12" fill="#0d1117" stroke="#22543d" stroke-width="1.5"/>
    <text x="400" y="47" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700" letter-spacing="1.5">PLANNER</text>
    <text x="400" y="67" text-anchor="middle" fill="#4ade8088" font-size="11">Sets vision, splits into sprints</text>
  </g>

  <!-- Arrow: Planner -> Negotiation -->
  <line x1="400" y1="84" x2="400" y2="112" stroke="#3a4556" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 2: CONTRACT NEGOTIATION ===================== -->
  <!-- Negotiation container -->
  <rect x="100" y="112" width="600" height="100" rx="14" fill="#0d111700" stroke="#2a3040" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="130" text-anchor="middle" fill="#6b7688" font-size="10" font-weight="600" letter-spacing="2">CONTRACT NEGOTIATION</text>

  <!-- Generator sub-node -->
  <g filter="url(#glow-blue)">
    <rect x="125" y="140" width="235" height="58" rx="10" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="242" y="163" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">GENERATOR</text>
    <text x="242" y="181" text-anchor="middle" fill="#60a5fa77" font-size="10.5">Proposes features + tests</text>
  </g>

  <!-- Evaluator sub-node -->
  <g filter="url(#glow-amber)">
    <rect x="440" y="140" width="235" height="58" rx="10" fill="#0d1117" stroke="#713f12" stroke-width="1.5"/>
    <text x="558" y="163" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">EVALUATOR</text>
    <text x="558" y="181" text-anchor="middle" fill="#f59e0b77" font-size="10.5">Critiques, proposes new features</text>
  </g>

  <!-- Double arrows between Generator and Evaluator -->
  <line x1="368" y1="163" x2="432" y2="163" stroke="#3a4556" stroke-width="1.3" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- AGREE? label -->
  <rect x="372" y="149" width="56" height="16" rx="4" fill="#0d1117"/>
  <text x="400" y="161" text-anchor="middle" fill="#8b95a5" font-size="9.5" font-weight="600" letter-spacing="0.5">AGREE?</text>

  <!-- Arrow: Negotiation -> Implementation -->
  <line x1="400" y1="212" x2="400" y2="244" stroke="#3a4556" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 3: IMPLEMENTATION ===================== -->
  <g filter="url(#glow-blue)">
    <rect x="200" y="244" width="400" height="62" rx="12" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="400" y="270" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="700" letter-spacing="0.5">IMPLEMENTATION</text>
    <text x="400" y="290" text-anchor="middle" fill="#60a5fa77" font-size="11">Builds with craft, self-tests, reads skill files</text>
  </g>

  <!-- Arrow: Implementation -> Adversarial Eval -->
  <line x1="400" y1="306" x2="400" y2="338" stroke="#3a4556" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 4: ADVERSARIAL EVALUATION ===================== -->
  <g filter="url(#glow-amber)">
    <rect x="200" y="338" width="400" height="62" rx="12" fill="#0d1117" stroke="#713f12" stroke-width="1.5"/>
    <text x="400" y="363" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700" letter-spacing="0.5">ADVERSARIAL EVAL</text>
    <text x="400" y="383" text-anchor="middle" fill="#f59e0b77" font-size="11">Writes own tests, uses product as user, tries to break it</text>
  </g>

  <!-- Loop arrow: Adversarial Eval back to Implementation -->
  <path d="M 608 350 C 660 350, 670 280, 608 275" fill="none" stroke="#3a4556" stroke-width="1.3" marker-end="url(#arrow)"/>
  <!-- FAIL -> fix label on loop -->
  <rect x="640" y="300" width="68" height="18" rx="4" fill="#0d1117"/>
  <text x="674" y="313" text-anchor="middle" fill="#8b95a5" font-size="9.5" font-weight="600" letter-spacing="0.3">FAIL &#x2192; fix</text>

  <!-- Arrow: Adversarial Eval -> Final Review -->
  <line x1="400" y1="400" x2="400" y2="432" stroke="#3a4556" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 5: FINAL REVIEW ===================== -->
  <g filter="url(#glow-neutral)">
    <rect x="250" y="432" width="300" height="62" rx="12" fill="#0d1117" stroke="#252d3a" stroke-width="1.5"/>
    <text x="400" y="458" text-anchor="middle" fill="#c8ced8" font-size="15" font-weight="700" letter-spacing="0.5">FINAL REVIEW</text>
    <text x="400" y="478" text-anchor="middle" fill="#c8ced877" font-size="11">Senior review &#x2014; Ship or Fix</text>
  </g>

  <!-- Step numbers along the left -->
  <g fill="#2a3040" font-size="11" font-weight="700" letter-spacing="0.5">
    <circle cx="52" cy="53" r="12" fill="none" stroke="#22543d" stroke-width="1" opacity="0.6"/>
    <text x="52" y="57" text-anchor="middle" fill="#4ade8088">1</text>

    <circle cx="52" cy="169" r="12" fill="none" stroke="#3a4556" stroke-width="1" opacity="0.6"/>
    <text x="52" y="173" text-anchor="middle" fill="#6b7688">2</text>

    <circle cx="52" cy="275" r="12" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
    <text x="52" y="279" text-anchor="middle" fill="#60a5fa88">3</text>

    <circle cx="52" cy="369" r="12" fill="none" stroke="#713f12" stroke-width="1" opacity="0.6"/>
    <text x="52" y="373" text-anchor="middle" fill="#f59e0b88">4</text>

    <circle cx="52" cy="463" r="12" fill="none" stroke="#252d3a" stroke-width="1" opacity="0.6"/>
    <text x="52" y="467" text-anchor="middle" fill="#c8ced877">5</text>
  </g>
</svg>