<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Why Adversarial Evaluation?</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">The agent that built it should NOT be the one judging it.</text>

  <!-- Left column: Traditional -->
  <rect x="24" y="74" width="368" height="206" rx="8" fill="#0d1117" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="208" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f87171">Traditional AI Testing</text>
  <line x1="108" y1="110" x2="308" y2="110" stroke="#7f1d1d" stroke-width="0.5"/>

  <!-- Left items -->
  <text x="56" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#f87171" font-weight="700">&#x2717;</text>
  <text x="76" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Re-runs generator's tests</text>

  <text x="56" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#f87171" font-weight="700">&#x2717;</text>
  <text x="76" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Same perspective as builder</text>

  <text x="56" y="204" font-family="system-ui, sans-serif" font-size="13" fill="#f87171" font-weight="700">&#x2717;</text>
  <text x="76" y="204" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Tests pass = done</text>

  <text x="56" y="236" font-family="system-ui, sans-serif" font-size="13" fill="#f87171" font-weight="700">&#x2717;</text>
  <text x="76" y="236" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Code review only</text>

  <!-- Right column: Adversarial -->
  <rect x="408" y="74" width="368" height="206" rx="8" fill="#0d1117" stroke="#22543d" stroke-width="1.5"/>
  <text x="592" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80">Adversarial Evaluation</text>
  <line x1="492" y1="110" x2="692" y2="110" stroke="#22543d" stroke-width="0.5"/>

  <!-- Right items -->
  <text x="440" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" font-weight="700">&#x2713;</text>
  <text x="460" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Writes its OWN adversarial tests</text>

  <text x="440" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" font-weight="700">&#x2713;</text>
  <text x="460" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Fresh session — zero bias</text>

  <text x="440" y="204" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" font-weight="700">&#x2713;</text>
  <text x="460" y="204" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Tests pass = minimum bar, now attack</text>

  <text x="440" y="236" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" font-weight="700">&#x2713;</text>
  <text x="460" y="236" font-family="system-ui, sans-serif" font-size="13" fill="#c9d1d9">Product review — uses it as a real user</text>
</svg>